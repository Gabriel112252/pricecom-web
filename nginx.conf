server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Vite fingerprints js/css/assets with a content hash, so they can be
    # cached aggressively and immutably.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html must always be revalidated, otherwise browsers can keep
    # serving an old shell that references stale hashed asset filenames.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: any unmatched path (deep link like /produtos, or a
    # hard refresh on a Vue Router route) falls back to index.html so the
    # client-side router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
